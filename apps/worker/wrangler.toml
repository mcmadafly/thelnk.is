name = "thelnk-short"
main = "src/index.ts"
compatibility_date = "2026-05-12"

# Same D1 database as the Astro worker (`thelnk-web`).
[[d1_databases]]
binding = "DB"
database_name = "thelnk"
database_id = "23bf7d86-e447-4fc3-8f64-3881ae393649"
migrations_dir = "../web/migrations"

# Forward `/`, `/api/*`, `/f/*`, etc. to the Astro worker on the same hostname (apex).
[[services]]
binding = "WEB"
service = "thelnk-web"

[vars]
# Canonical site URL (fallback when WEB binding is absent, e.g. some local setups).
APP_ORIGIN = "https://thelnk.is"

# After DNS: attach the zone apex (or `thelnk.is/*`) to this Worker in the dashboard.
# [[routes]]
# pattern = "thelnk.is/*"
# zone_name = "thelnk.is"
